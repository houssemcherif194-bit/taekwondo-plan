
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0;font-family:var(--font-sans)}
.tabs{display:flex;gap:6px;margin-bottom:1.2rem;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);font-size:12px;font-weight:500;cursor:pointer;color:var(--color-text-secondary);background:transparent;transition:all 0.15s}
.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.phase-panel{display:none}
.phase-panel.active{display:block}
.phase-meta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1.2rem}
.meta-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.meta-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px}
.meta-val{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.day-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:8px}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.day-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.day-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.day-type{font-size:11px;color:var(--color-text-secondary);margin-right:auto}
.day-drills{display:flex;flex-direction:column;gap:4px}
.drill-row{display:flex;align-items:baseline;gap:8px;font-size:12px;color:var(--color-text-secondary)}
.drill-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.drill-load{font-size:11px;color:var(--color-text-tertiary);margin-right:auto;white-space:nowrap}
.intensity-bar{height:4px;border-radius:2px;margin-top:6px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:1rem}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:9px;height:9px;border-radius:2px}
</style>

<div class="wrap">

<div class="tabs">
  <button class="tab active" onclick="showPhase(0)">المرحلة 1 — بناء القاعدة</button>
  <button class="tab" onclick="showPhase(1)">المرحلة 2 — تطوير خاص</button>
  <button class="tab" onclick="showPhase(2)">المرحلة 3 — قبل البطولة</button>
  <button class="tab" onclick="showPhase(3)">المرحلة 4 — Taper</button>
</div>

<div id="p0" class="phase-panel active"></div>
<div id="p1" class="phase-panel"></div>
<div id="p2" class="phase-panel"></div>
<div id="p3" class="phase-panel"></div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#5DCAA5"></div>تقنية</div>
  <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>قوة</div>
  <div class="leg"><div class="leg-dot" style="background:#EF9F27"></div>HIIT/VO₂</div>

  <div class="leg"><div class="leg-dot" style="background:#D3D1C7"></div>راحة</div>

</div>

function showPhase(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.phase-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

function buildPhase(ph, idx){
  const el = document.getElementById('p'+idx);
  const meta = document.createElement('div');
  meta.className='phase-meta';
  meta.innerHTML=`<div class="meta-card"><div class="meta-label">حجم</div><div class="meta-val">${ph.vol}</div></div><div class="meta-card"><div class="meta-label">شدة</div><div class="meta-val">${ph.int}</div></div><div class="meta-card"><div class="meta-label">تكتيك</div><div class="meta-val">${ph.tact}</div></div>`;
  el.appendChild(meta);

  ph.days.forEach(d=>{
    const c=C[d.type];
    const card=document.createElement('div');
    card.className='day-card';
    const hdr=document.createElement('div');
    hdr.className='day-header';
    hdr.innerHTML=`<span class="day-badge" style="background:${c.bg};color:${c.tc}">${d.label}</span><span class="day-name">${d.name}</span>`;
    card.appendChild(hdr);
    const drills=document.createElement('div');
    drills.className='day-drills';
    d.drills.forEach(dr=>{
      const row=document.createElement('div');
      row.className='drill-row';
      row.innerHTML=`<span class="drill-dot" style="background:${c.bar}"></span><span style="flex:1;line-height:1.5">${dr.t}</span>${dr.load?`<span class="drill-load">${dr.load}</span>`:''}`;
      drills.appendChild(row);
    });
    card.appendChild(drills);
    if(d.int>0){
      const bar=document.createElement('div');
      bar.className='intensity-bar';
      bar.style.cssText=`background:var(--color-background-secondary)`;
      const fill=document.createElement('div');
      fill.style.cssText=`height:100%;width:${d.int}%;background:${c.bar};border-radius:2px`;
      bar.appendChild(fill);
      card.appendChild(bar);
      const pct=document.createElement('div');
      pct.style.cssText='font-size:10px;color:var(--color-text-tertiary);margin-top:2px;text-align:right';
      pct.textContent='شدة '+d.int+'%';
      card.appendChild(pct);
    }
    el.appendChild(card);
  });
}

phases.forEach((ph,i)=>buildPhase(ph,i));
